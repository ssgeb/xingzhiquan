
spring:
  application:
    name: xingzhiquan-auth
  datasource:
    url: jdbc:mysql://localhost:3306/w?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20             # 连接池最大连接数
      minimum-idle: 5                   # 最小空闲连接数
      idle-timeout: 600000              # 10 分钟：空闲多久回收
      max-lifetime: 1700000             # 约 28 分钟
      keepalive-time: 300000            # 5 分钟发一次“保活”
      connection-timeout: 30000         # 30 秒拿不到连接就报错
  jackson:
    serialization:
      write-dates-as-timestamps: false
  data:
    redis:
      host: localhost
      port: 6379
      password: '123456'
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      default-topic: xingzhiquan-counter-events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      linger: 10ms
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: xingzhiquan-counter-agg
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false
    listener:
      type: single
      ack-mode: manual
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}

  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:${OPENAI_API_KEY:}}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-plus
          temperature: 0.8
 
      embedding:
        options:
          model: text-embedding-v4 # 向量模型
          dimensions: 1536

    vectorstore:
      elasticsearch:
        initialize-schema: true
        index-name: xingzhiquan-ai-index
        dimensions: 1536 # 一定要和上面的 dimensions 一致，否则会报错
  elasticsearch:
    uris: http://127.0.0.1:9200

canal:
  enabled: true
  host: 127.0.0.1
  port: 11111
  destination: example
  username: "canal"
  password: "Canal@123456"
  filter: w\\.outbox
  batchSize: 1000
  intervalMs: 1000

counter:
  rebuild:
    enabled: false
    lock:
      ttl-ms: 5000
      watchdog-ms: 30000
    rate:
      permits: 3
      window-seconds: 10
    backoff:
      base-ms: 500
      max-ms: 30000

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

auth:
  jwt:
    issuer: xingzhiquan
    key-id: xingzhiquan-key
    private-key: classpath:keys/private.pem
    public-key: classpath:keys/public.pem
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  verification:
    code-length: 6
    ttl: PT5M
    max-attempts: 5
    send-interval: PT60S
    daily-limit: 10
  password:
    bcrypt-strength: 12
    min-length: 8

logging:
  level:
    root: INFO
    '[com.tongji]': DEBUG

oss:
  endpoint: oss-cn-beijing.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket: xingzhiquan
  public-domain: ${OSS_PUBLIC_DOMAIN:}
  folder: avatars

cache:
  l2:
    public-cfg:
      ttl-seconds: 15
      max-size: 1000
    mine-cfg:
      ttl-seconds: 10
      max-size: 1000
  hotkey:
    window-seconds: 60
    segment-seconds: 10
    level-low: 50
    level-medium: 200
    level-high: 500
    extend-low-seconds: 20
    extend-medium-seconds: 60
    extend-high-seconds: 120

